{{define "layout"}}
<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puppy Routine Tracker</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Puppy">
    <meta name="theme-color" content="#1c1917">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    {{template "styles" .}}
</head>
<body class="text-stone-800 min-h-screen">
    <div class="max-w-md mx-auto px-4 py-6 pb-12">

        <header class="flex items-center justify-between mb-5">
            <div>
                <h1 class="text-lg font-semibold tracking-tight text-stone-800">Puppy Routine Tracker 🦆</h1>
                <p class="text-xs text-stone-400">{{.Config.PuppyName}}</p>
            </div>
            <div class="flex items-center gap-1">
                <a href="/stats" title="Stats" class="w-8 h-8 flex items-center justify-center rounded-lg text-stone-400 hover:text-stone-600 hover:bg-stone-100 transition-colors text-base">◈</a>
                <a href="/settings" title="Settings" class="w-8 h-8 flex items-center justify-center rounded-lg text-stone-400 hover:text-stone-600 hover:bg-stone-100 transition-colors text-base">⚙</a>
            </div>
        </header>

        {{if .IsLocal}}
        <div class="mb-4 px-3 py-2 rounded-xl bg-amber-100 border border-amber-200 text-xs text-amber-700 font-medium">
            Local · db: {{if .DBPath}}{{.DBPath}}{{else}}./puppy.db{{end}}
        </div>
        {{end}}

        <div id="state-container"
             hx-get="/api/state"
             hx-trigger="every 10s [document.visibilityState !== 'hidden' && !document.querySelector('#state-container input:focus, #state-container textarea:focus')]"
             hx-swap="innerHTML">
            {{template "state" .}}
        </div>

    </div>
</body>
</html>
{{end}}
