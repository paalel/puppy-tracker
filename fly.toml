# fly.toml app configuration file.
# App name is intentionally omitted — pass via --app flag or set FLY_APP env var.
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

primary_region = 'arn'

[build]

[env]
  DATABASE_PATH = '/data/puppy.db'
  TZ = 'Europe/Oslo'

[[mounts]]
  source = 'puppy_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
