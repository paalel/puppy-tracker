app = "puppy-routine-tracker"
primary_region = "arn"

[build]

[env]
  DATABASE_PATH = "/data/puppy.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "puppy_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
